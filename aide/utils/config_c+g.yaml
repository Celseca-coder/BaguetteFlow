# path to the task data directory
data_dir: null
#dataset_dir: null

# either provide a path to a plaintext file describing the task
desc_file: null
generate_report: False
# or provide the task goal (and optionally evaluation information) as arguments
goal: null
eval: null
# generate_report: True

log_dir: ./logs/run
log_level: INFO
workspace_dir: ./workspaces/run
faiss_dir : '/inspire/ssd/tenant_predefaa-9a1b-4522-bb10-8850f313be13/global_user/5965-xiaokangcheng/models/gte-small'

# whether to unzip any archives in the data directory
preprocess_data: True
# whether to copy the data to the workspace directory (otherwise it will be symlinked)
# copying is recommended to prevent the agent from accidentally modifying the original data
copy_data: True

exp_name: null # a random experiment name will be generated if not provided

ablation_prob: 0.1

cpu_number: 80
start_cpu_id: 0

# settings for code execution
exec:
  timeout: 32400
  agent_file_name: runfile.py
  format_tb_ipython: False

# LLM settings for final report from journal
report:
  model: qwen3-max
  temp: 0.7

# agent hyperparams
agent:
  # how many improvement iterations to run
  steps: 400
  # total time available to agent
  time_limit: 43200 # 12 hrs (purely informational, implementation is user's resp)
  # whether to instruct the agent to use CV (set to 1 to disable)
  k_fold_validation: 3
  # whether to instruct the agent to generate a prediction function
  expose_prediction: False
  # whether to provide the agent with a preview of the data
  data_preview: True
  # whether to convert system messages into user messages
  # whether to obfuscate that we're doing kaggle
  obfuscate: False
  # check submission format
  check_format: True
  # for mcts
  save_all_submission: True
  # steerable reasoning, only works when your deepseek api support client.completions.create()
  steerable_reasoning: True
    # ablation study step
  ablation_step: 3

  # LLM settings for coding
  draft:
    model: us.anthropic.claude-sonnet-4-6
    temp: 0.7
    # api_key : sk-fee0f5d945214659bedbbb808b294134
    # base_url : https://dashscope.aliyuncs.com/compatible-mode/v1

  debug:
    model: us.anthropic.claude-sonnet-4-6
    temp: 0.5
    # api_key: sk-fee0f5d945214659bedbbb808b294134
    # base_url: https://dashscope.aliyuncs.com/compatible-mode/v1


  # LLM settings for evaluating program output / tracebacks
  feedback:
    model: gemini-3.1-pro-preview
    temp: 0.6
    # api_key : sk-fee0f5d945214659bedbbb808b294134
    # base_url : https://dashscope.aliyuncs.com/compatible-mode/v1
    
  cheap:
    model: qwen3.6-max-preview
    temp: 0.6
    api_key : sk-fee0f5d945214659bedbbb808b294134
    base_url : https://dashscope.aliyuncs.com/compatible-mode/v1
  # hyperparameters for the tree search
  search:
    back_debug_depth: 3
    max_debug_depth: 20
    ablation_improve_depth: 5
    debug_prob: 0.2

    topk_best: 4
    explosion_prob: 0.3
    crossover_prob: 0.3
    min_sparks: 1
    max_sparks: 8
    total_sparks: 12
    
    
    num_drafts: 3
    num_bugs: 1
    num_improves: 3
    invalid_metric_upper_bound: 100
    metric_improvement_threshold: 0.0001
    max_improve_failure: 3
    parallel_search_num: 3

  decay:
    decay_type: piecewise       # decay_type
    exploration_constant: 1.414        # exploration constant
    lower_bound: 0.5                # Lower exploration limit to prevent values from being too small
    linear_decay:
      alpha: 0.01
    exponential_decay:
      gamma: 0.99
    piecewise_decay:
      alpha: 0.01
      phase_ratios: [0.3, 0.7]
    dynamic_piecewise_decay:
      alpha: 0.01
      phase_ratios: [0.85, 1]